# Сборка установщика и публикация в GitHub Release при пуше тега v* (например v0.1.0, v0.1.1).
# Как выкатить патч: поднять version в package.json → commit → git tag v0.1.1 → git push origin v0.1.1

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run electron:build -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            release/*.exe
            release/latest.yml

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run electron:build:mac -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            release/*.dmg
            release/latest-mac.yml

  publish:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - uses: actions/download-artifact@v4
        with:
          name: mac-artifacts
          path: artifacts/mac

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [ -f "RELEASE_NOTES.md" ]; then
            NOTES=$(cat RELEASE_NOTES.md)
          else
            NOTES="Release $TAG"
          fi
          gh release create "$TAG" \
            --title "Grindly $TAG" \
            --notes "$NOTES" \
            artifacts/windows/*.exe \
            artifacts/windows/latest.yml \
            artifacts/mac/*.dmg \
            artifacts/mac/latest-mac.yml
